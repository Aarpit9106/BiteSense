        body { font-family: 'Inter', sans-serif; }

            background: rgba(255, 255, 255, 0.4);

<body class="bg-background text-on-background min-h-screen bio-luminous-bg flex flex-col items-center justify-center overflow-x-hidden">
<!-- Header (TopAppBar predicted component implementation) -->
<header class="fixed top-0 w-full z-50 bg-emerald-50/70 dark:bg-slate-950/70 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-emerald-700 dark:text-emerald-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tighter text-emerald-800 dark:text-emerald-200">BiteSense</h1>
</div>
<div class="flex items-center gap-2">
<span class="font-['Inter'] font-semibold tracking-tight text-lg text-emerald-700 dark:text-emerald-400">Step 3 of 5</span>
</div>
</header>
<main class="w-full max-w-xl px-6 pt-24 pb-32 flex flex-col gap-12">
<!-- Progress Section -->
<div class="w-full flex flex-col gap-4">
<div class="flex justify-between items-end">
<span class="font-label font-bold uppercase tracking-widest text-[10px] text-on-surface-variant">Profile Completion</span>
<span class="font-headline font-extrabold text-primary text-2xl tracking-tighter">60%</span>
</div>
<div class="h-3 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full w-[60%] bg-gradient-to-r from-primary to-primary-container rounded-full transition-all duration-1000 ease-out"></div>
</div>
</div>
<!-- Title & Intro -->
<div class="space-y-2">
<h2 class="font-headline font-bold text-4xl text-on-surface leading-tight tracking-tight">Tell us about your preferences</h2>
<p class="font-body text-on-surface-variant text-lg">We'll use these to tailor your daily nutritional insights and recipe recommendations.</p>
</div>
<!-- Glassmorphism Card for Preferences -->
<div class="glass-card rounded-xl p-8 shadow-[0_-4px_40px_rgba(0,0,0,0.04)] ring-1 ring-white/20">
<div class="grid grid-cols-1 gap-4">
<!-- Preference Multi-select Chips -->
<div class="flex flex-wrap gap-3">
<!-- Option 1: Selected State Example -->
<button class="flex-grow md:flex-grow-0 group flex items-center justify-between px-6 py-5 bg-gradient-to-br from-emerald-600 to-emerald-400 text-white rounded-xl shadow-lg shadow-emerald-900/10 scale-105 transition-all duration-300">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-headline font-bold text-lg">High Protein</span>
</div>
<span class="material-symbols-outlined">check_circle</span>
</button>
<!-- Option 2 -->
<button class="flex-grow md:flex-grow-0 group flex items-center justify-between px-6 py-5 bg-surface-container-lowest text-on-surface hover:bg-surface-container-high rounded-xl transition-all duration-300">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">eco</span>
<span class="font-headline font-bold text-lg">Low Carb</span>
</div>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-40">add_circle</span>
</button>
<!-- Option 3 -->
<button class="flex-grow md:flex-grow-0 group flex items-center justify-between px-6 py-5 bg-surface-container-lowest text-on-surface hover:bg-surface-container-high rounded-xl transition-all duration-300">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">water_drop</span>
<span class="font-headline font-bold text-lg">Low Fat</span>
</div>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-40">add_circle</span>
</button>
<!-- Option 4 -->
<button class="flex-grow md:flex-grow-0 group flex items-center justify-between px-6 py-5 bg-surface-container-lowest text-on-surface hover:bg-surface-container-high rounded-xl transition-all duration-300">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">grass</span>
<span class="font-headline font-bold text-lg">High Fiber</span>
</div>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-40">add_circle</span>
</button>
</div>
</div>
<!-- Asymmetric Informational Bit -->
<div class="mt-8 pt-8 border-t border-outline-variant/20">
<div class="flex gap-4 items-start">
<div class="p-3 bg-tertiary-container/20 rounded-full">
<span class="material-symbols-outlined text-tertiary-container">info</span>
</div>
<div class="space-y-1">
<p class="font-headline font-bold text-on-surface">Pro Tip</p>
<p class="font-body text-sm text-on-surface-variant leading-relaxed">Selecting multiple options helps our AI balance your micronutrient intake more effectively.</p>
</div>
</div>
</div>
</div>

<button class="text-emerald-800/40 dark:text-emerald-200/40 p-4 hover:brightness-110 transition-all scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined">arrow_back</span>

<div class="w-2 h-2 rounded-full bg-emerald-800/20"></div>
<div class="w-2 h-2 rounded-full bg-emerald-800/20"></div>

<div class="w-2 h-2 rounded-full bg-emerald-800/20"></div>
