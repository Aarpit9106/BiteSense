<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .bio-luminous-bg {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(244, 251, 244, 1) 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body min-h-screen bio-luminous-bg">
<!-- Top Navigation Shell (Onboarding Context: Suppressed standard nav, showing progress) -->
<header class="fixed top-0 w-full z-50 bg-emerald-50/70 dark:bg-slate-950/70 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-emerald-700 dark:text-emerald-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-xl font-bold tracking-tighter text-emerald-800 dark:text-emerald-200">BiteSense</span>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col items-end gap-1">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Step 2 of 5</span>
<div class="w-32 h-1.5 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-[40%] rounded-full"></div>
</div>
</div>
</header>
<main class="pt-28 pb-32 px-6 max-w-2xl mx-auto">
<!-- Hero Section -->
<section class="mb-12">
<h1 class="text-[2.75rem] font-bold tracking-tight leading-[1.1] text-on-surface mb-4">What is your diet preference?</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">Tailor your experience. We use this to curate recipes and nutritional insights specifically for your lifestyle.</p>
</section>
<!-- Bento Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option: Vegetarian -->
<button class="group relative flex flex-col items-start p-8 rounded-xl glass-card border border-outline-variant/10 hover:border-primary/30 transition-all duration-500 text-left overflow-hidden">
<div class="mb-6 p-4 rounded-full bg-primary-container/20 text-primary transition-transform duration-500 group-hover:scale-110">
<span class="material-symbols-outlined text-3xl" data-icon="leafy_green">energy_savings_leaf</span>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2">Vegetarian</h3>
<p class="text-sm text-on-surface-variant leading-snug">No meat or fish. Includes dairy and honey products.</p>
<div class="absolute top-6 right-6 opacity-0 group-focus:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Vegan -->
<button class="group relative flex flex-col items-start p-8 rounded-xl glass-card border border-outline-variant/10 hover:border-primary/30 transition-all duration-500 text-left overflow-hidden">
<div class="mb-6 p-4 rounded-full bg-primary-container/20 text-primary transition-transform duration-500 group-hover:scale-110">
<span class="material-symbols-outlined text-3xl" data-icon="nature">nature</span>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2">Vegan</h3>
<p class="text-sm text-on-surface-variant leading-snug">Plant-based only. No animal products or derivatives.</p>
<div class="absolute top-6 right-6 opacity-0 group-focus:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Eggetarian -->
<button class="group relative flex flex-col items-start p-8 rounded-xl glass-card border border-outline-variant/10 hover:border-primary/30 transition-all duration-500 text-left overflow-hidden">
<div class="mb-6 p-4 rounded-full bg-tertiary-container/20 text-tertiary transition-transform duration-500 group-hover:scale-110">
<span class="material-symbols-outlined text-3xl" data-icon="egg">egg</span>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2">Eggetarian</h3>
<p class="text-sm text-on-surface-variant leading-snug">Vegetarian diet that includes eggs but no dairy or meat.</p>
<div class="absolute top-6 right-6 opacity-0 group-focus:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Non Veg -->
<button class="group relative flex flex-col items-start p-8 rounded-xl glass-card border border-outline-variant/10 hover:border-primary/30 transition-all duration-500 text-left overflow-hidden">
<div class="mb-6 p-4 rounded-full bg-secondary-container/30 text-secondary transition-transform duration-500 group-hover:scale-110">
<span class="material-symbols-outlined text-3xl" data-icon="restaurant">restaurant</span>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2">Non Veg</h3>
<p class="text-sm text-on-surface-variant leading-snug">Includes all food groups including meat, poultry, and seafood.</p>
<div class="absolute top-6 right-6 opacity-0 group-focus:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Asymmetric Visual Element -->
<div class="mt-12 p-8 rounded-xl bg-surface-container-low relative overflow-hidden flex items-center gap-6">
<div class="flex-1 z-10">
<h4 class="font-bold text-emerald-800 mb-1">Personalized Nutrition</h4>
<p class="text-sm text-on-surface-variant max-w-[240px]">Your diet choice adjusts your daily macro targets automatically.</p>
</div>
<div class="absolute -right-12 -bottom-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="w-24 h-24 rounded-full overflow-hidden flex-shrink-0 z-10 border-4 border-white shadow-xl">
<img class="w-full h-full object-cover" data-alt="vibrant healthy Buddha bowl with avocado, chickpeas, and fresh greens in bright morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlGVi4OGrRU0kEOoGHb-0_o76eJlODZ7_W2o4DtQlnHcmUJ9GCXui7xqvP5xYcAWw2npZRnEWYkmkUuEMrOGx3Lmv-xAXhO0HQdH6aHqkA41PsDqQubZd8ANGPToj13e68uWBSGiDc-HvuGXYBcZ9jEa_hRsR_LWeqDONMzXQ9DzrX1g7yRA1pI69-HNQCAPsUrHMMbjgIFrASFpToK-TAKvaLfQW9VRDcBA0TJAf1Pr0KWlDk0llJAP7ajMB-HjB3qb80qEmoz7u8"/>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Action Focus) -->
<footer class="fixed bottom-0 w-full z-50 bg-emerald-50/70 dark:bg-slate-950/70 backdrop-blur-xl px-10 py-6 flex justify-between items-center rounded-t-[3rem] shadow-[0_-4px_40px_rgba(0,0,0,0.04)]">
<button class="text-emerald-800/40 dark:text-emerald-200/40 p-4 font-bold tracking-widest text-[10px] uppercase hover:brightness-110 transition-all scale-105 active:scale-95 duration-300">
            Skip for now
        </button>
<button class="bg-gradient-to-br from-emerald-600 to-emerald-400 text-white rounded-full px-10 py-4 font-bold flex items-center gap-2 shadow-lg shadow-emerald-500/20 hover:brightness-110 transition-all scale-105 active:scale-95 duration-300">
            Continue
            <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
